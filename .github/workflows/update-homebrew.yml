name: Update Homebrew Formula

on:
  workflow_run:
    workflows: ["Build Binaries"]
    types: [completed]

jobs:
  update-formula:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get latest release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Linux binary and compute checksums
        id: checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"

          # Linux: ship the prebuilt binary (no Gatekeeper / provenance issues).
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "cc-ping-linux-x64" \
            --dir .
          SHA_LINUX=$(sha256sum cc-ping-linux-x64 | cut -d ' ' -f 1)
          echo "sha_linux_x64=$SHA_LINUX" >> "$GITHUB_OUTPUT"

          # macOS: build from source on the user's machine to avoid Gatekeeper's
          # com.apple.provenance xattr blocking downloaded ad-hoc-signed binaries.
          # Need the source tarball SHA for the Homebrew formula.
          curl -fsSL -o "cc-ping-source-${VERSION}.tar.gz" \
            "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          SHA_SOURCE=$(sha256sum "cc-ping-source-${VERSION}.tar.gz" | cut -d ' ' -f 1)
          echo "sha_source=$SHA_SOURCE" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: wbern/homebrew-cc-ping
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-cc-ping

      - name: Update formula
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHA_SOURCE: ${{ steps.checksums.outputs.sha_source }}
          SHA_LINUX_X64: ${{ steps.checksums.outputs.sha_linux_x64 }}
        run: |
          # Quoted heredoc — no shell expansion, so backslashes in the bun
          # build --define stay intact. Substitute placeholders afterward.
          cat > homebrew-cc-ping/Formula/cc-ping.rb << 'RUBY'
          class CcPing < Formula
            desc "Ping Claude Code sessions to trigger quota windows across multiple accounts"
            homepage "https://github.com/wbern/cc-ping"
            license "MIT"
            version "@@VERSION@@"

            livecheck do
              url "https://github.com/wbern/cc-ping/releases/latest"
              regex(/v(\d+(?:\.\d+)+)/i)
            end

            if OS.mac?
              # Build from source on the user's machine. Pre-built binaries
              # downloaded from GitHub Releases get tagged with macOS Sequoia's
              # com.apple.provenance xattr, which Gatekeeper blocks for
              # ad-hoc-signed Mach-O binaries.
              url "https://github.com/wbern/cc-ping/archive/refs/tags/v#{version}.tar.gz"
              sha256 "@@SHA_SOURCE@@"
              depends_on "oven-sh/bun/bun" => :build
            elsif OS.linux?
              url "https://github.com/wbern/cc-ping/releases/download/v#{version}/cc-ping-linux-x64"
              sha256 "@@SHA_LINUX_X64@@"
            else
              odie "cc-ping: unsupported platform"
            end

            def install
              if OS.mac?
                ENV["BUN_INSTALL_CACHE_DIR"] = buildpath/"bun-cache"
                system "bun", "install", "--no-save"
                system "bun", "build", "--compile", "--minify",
                       "--define", "__VERSION__=\"\\\"#{version}\\\"\"",
                       "./src/cli.ts", "--outfile", "cc-ping"
                # Re-sign ad-hoc to satisfy Gatekeeper after compile.
                system "codesign", "--remove-signature", "cc-ping"
                system "codesign", "--force", "--sign", "-", "cc-ping"
                bin.install "cc-ping"
              else
                bin.install "cc-ping-linux-x64" => "cc-ping"
              end
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/cc-ping --version")
            end
          end
          RUBY

          sed -i \
            -e "s|@@VERSION@@|${VERSION}|g" \
            -e "s|@@SHA_SOURCE@@|${SHA_SOURCE}|g" \
            -e "s|@@SHA_LINUX_X64@@|${SHA_LINUX_X64}|g" \
            homebrew-cc-ping/Formula/cc-ping.rb

          echo "--- Generated formula ---"
          cat homebrew-cc-ping/Formula/cc-ping.rb

      - name: Commit and push
        run: |
          cd homebrew-cc-ping
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cc-ping.rb
          git diff --cached --quiet && exit 0
          git commit -m "cc-ping ${{ steps.release.outputs.version }}"
          git push
