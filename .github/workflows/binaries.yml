name: Build Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            os: macos-latest
          - target: darwin-x64
            os: macos-latest
          - target: linux-x64
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          # --define value is a JS string literal: one level of quotes only,
          # so __VERSION__ is the bare version (e.g. 1.2.3), not "1.2.3".
          bun build --compile --minify \
            --define "__VERSION__=\"$VERSION\"" \
            --target=bun-${{ matrix.target }} \
            ./src/cli.ts --outfile cc-ping-${{ matrix.target }}

      - name: Sign macOS binary
        if: startsWith(matrix.target, 'darwin')
        run: |
          codesign --remove-signature cc-ping-${{ matrix.target }} 2>/dev/null || true
          codesign --force --sign - cc-ping-${{ matrix.target }}
          codesign -dv cc-ping-${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cc-ping-${{ matrix.target }}
          path: cc-ping-${{ matrix.target }}

  checksums:
    name: Upload release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: binaries
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd binaries
          sha256sum cc-ping-* > checksums.txt
          cat checksums.txt

      - name: Upload all to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd binaries
          for f in cc-ping-* checksums.txt; do
            gh release upload "${{ github.event.release.tag_name }}" "$f" --repo "${{ github.repository }}"
          done
